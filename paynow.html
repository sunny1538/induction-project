<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family:'Poppins',sans-serif;
    background:#000;
    color:#fff;
    text-align:center;
  }

  header {
    padding:25px 15px;
    border-bottom:2px solid #facc15;
  }

  .heading {
    font-size:26px;
    font-weight:700;
    color:#facc15;
  }

  .container {
    padding:20px;
    max-width:500px;
    margin:auto;
  }

  .box {
    background:#fff; /* ✅ changed to white */
    color:#000; /* ✅ text black inside */
    border:1px solid #facc15;
    border-radius:12px;
    padding:20px;
  }

  .price {
    font-size:28px;
    font-weight:800;
    color:#000; /* ✅ adjusted for white bg */
    margin-bottom:15px;
  }

  .qr {
    width:100%;
    max-width:400px;
    height:400px;
    object-fit:contain;
    border:2px solid #facc15;
    border-radius:10px;
    margin:15px auto;
    display:block;
  }

  .btn {
    width:100%;
    padding:12px;
    background:#facc15;
    color:#000;
    border:none;
    border-radius:10px;
    font-weight:700;
    margin-top:15px;
    cursor:pointer;
  }

  .trust {
    font-size:12px;
    color:#16a34a; /* better green on white */
    margin-top:10px;
  }

  footer {
    margin-top:20px;
    padding:15px;
    font-size:12px;
    color:#aaa;
    border-top:1px solid #facc15;
  }
</style>
</head>

<body>

<header>
  <div class="heading">💳 Complete Payment</div>
</header>

<div class="container">

  <div class="box">

    <div class="price">Pay ₹299</div>

    <!-- 🔥 YOUR QR CODE -->
    <img src="https://ritzydeals.com/wp-content/uploads/2026/03/WhatsApp-Image-2026-03-22-at-00.01.18.jpeg" class="qr">

    <button class="btn" onclick="payNow()">
      Pay Now
    </button>

    <div class="trust">
      ✔ Scan QR or click Pay Now • ✔ Secure Payment
    </div>

  </div>

</div>

<footer>
  © 2026 Smart Induction Store
</footer>

<script>
  function payNow() {
    window.location.href = "upi://pay?pa=sunny153854@pthdfc&pn=Prince%20Gupta&am=299&cu=INR";
  }
</script>

</body>
</html>
