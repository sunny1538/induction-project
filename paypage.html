<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Payment</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family:'Poppins',sans-serif;
      background:#000;
      color:#fff;
    }

    header {
      text-align:center;
      padding:25px 15px;
      border-bottom:2px solid #facc15;
    }

    .heading {
      font-size:26px;
      font-weight:700;
      color:#facc15;
    }

    .container {
      padding:20px 15px;
      max-width:500px;
      margin:auto;
    }

    .box {
      background:#111;
      border:1px solid #facc15;
      border-radius:12px;
      padding:15px;
      margin-bottom:15px;
    }

    .title {
      font-size:16px;
      margin-bottom:10px;
      color:#facc15;
    }

    input {
      width:100%;
      padding:10px;
      margin-bottom:10px;
      border-radius:8px;
      border:none;
      outline:none;
    }

    .price-box {
      text-align:center;
      background:#000;
      border:1px solid #facc15;
      border-radius:10px;
      padding:12px;
    }

    .old {
      text-decoration:line-through;
      color:#f87171;
      font-size:13px;
    }

    .new {
      font-size:28px;
      font-weight:800;
      color:#facc15;
      margin-top:5px;
    }

    .btn {
      width:100%;
      padding:12px;
      background:#facc15;
      color:#000;
      border:none;
      border-radius:10px;
      font-weight:700;
      margin-top:10px;
      cursor:pointer;
    }

    .trust {
      text-align:center;
      font-size:12px;
      color:#4ade80;
      margin-top:10px;
    }

    footer {
      text-align:center;
      padding:15px;
      font-size:12px;
      color:#aaa;
      border-top:1px solid #facc15;
    }
  </style>
</head>

<body>

<header>
  <div class="heading">🔒 Secure Checkout</div>
</header>

<div class="container">

  <div class="box">
    <div class="title">Customer Details</div>

    <form action="https://formspree.io/f/xaqpkrgr" method="POST" id="orderForm">
      <input name="name" placeholder="Full Name" required>
      <input name="mobile" placeholder="Mobile Number" required>
      <input name="address" placeholder="Address" required>
      <input name="pincode" placeholder="Pincode" required>

      <button type="submit" class="btn">
        Pay ₹299 Now
      </button>

      <div class="trust">
        ✔ 100% Secure Payment • ✔ Free Delivery 
      </div>
    </form>

  </div>

</div>

<footer>
  © 2026 Smart Induction Store
</footer>

<script>
  const form = document.getElementById('orderForm');

  form.addEventListener('submit', function(e) {
    e.preventDefault();

    const mobile = form.mobile.value;
    const pincode = form.pincode.value;

    if (!/^[0-9]{10}$/.test(mobile)) {
      alert("❌ Enter correct 10 digit mobile number");
      return;
    }

    if (!/^[0-9]{6}$/.test(pincode)) {
      alert("❌ Enter correct 6 digit pincode");
      return;
    }

    fetch(form.action, {
      method: "POST",
      body: new FormData(form),
      headers: { 'Accept': 'application/json' }
    }).then(() => {

      // Universal UPI (user selects app)
      window.location.href = "paynow.html";

    }).catch(() => {
      alert("❌ Something went wrong!");
    });
  });
</script>

</body>
</html>
